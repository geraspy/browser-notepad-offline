<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family:'Source Sans 3',sans-serif;
      margin:0;
      padding:0;
      height:100vh;
      display:flex;
      flex-direction:column;
    }

    #note {
      flex:1;
      width:100%;
      resize:none;
      padding:12px;
      font-size:15px;
      border:none;
      outline:none;
      box-sizing:border-box;
      overflow:auto;
      white-space:pre-wrap;
    }

    .controls {
      padding:10px;
      display:flex;
      gap:10px;
      border-top:1px solid #ddd;
      background:#fff;
      align-items:center;
    }

    .undo-redo {
      display:flex;
      gap:6px;
    }

    .undo-redo button {
      width:40px;
      padding:10px 0;
      border:none;
      border-radius:6px;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      color:#fff;
      background:#718096;
      display:flex;
      align-items:center;
      justify-content:center;
      line-height:1;
    }

    .undo-redo button:hover {
      background:#5a6678;
    }

    .undo-redo button:disabled {
      background:#cbd5e0;
      cursor:not-allowed;
    }

    button {
      flex:1;
      padding:10px 12px;
      border:none;
      border-radius:6px;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      color:#fff;
    }

    #copyBtn { background:#2b6cb0; }
    #copyBtn:hover { background:#2c7edb; }

    #clearBtn { background:#e53e3e; }
    #clearBtn:hover { background:#ff4b4b; }
  </style>
<base target="_blank">
</head>
<body>

  <textarea id="note"></textarea>

  <div class="controls">
    <div class="undo-redo">
      <button id="undoBtn" title="undo">←</button>
      <button id="redoBtn" title="redo">→</button>
    </div>
    <button id="copyBtn">copy</button>
    <button id="clearBtn">clear</button>
  </div>

  <script src="notepad_window.js"></script>
</body>
</html>
